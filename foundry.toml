[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.28"
evm_version = "cancun"
optimizer = true
optimizer_runs = 200
via_ir = false

# Remappings
remappings = [
    "forge-std/=lib/forge-std/src/",
    "@openzeppelin/=lib/openzeppelin-contracts/",
    "@pythnetwork/=lib/pyth-sdk-solidity/"
]

# Testing
[fuzz]
runs = 256
max_test_rejects = 65536
seed = "0x1"

[invariant]
runs = 256
depth = 50
fail_on_revert = false
call_override = false
shrink_run_limit = 5000

# Formatting
[fmt]
line_length = 120
tab_width = 4
bracket_spacing = false
int_types = "long"
multiline_func_header = "params_first"
quote_style = "double"
number_underscore = "thousands"
single_line_statement_blocks = "preserve"
sort_imports = true

# Gas reports
[profile.default.gas_report]
# Contracts to include in gas report
include = ["OwnVault", "eToken", "AssetRegistry", "SignedOracleVerifier", "LiquidationEngine", "VaultManager"]

# CI profile: more fuzz runs
[profile.ci]
fuzz = { runs = 10_000 }
invariant = { runs = 1_000, depth = 100 }

# Audit profile: max fuzz runs
[profile.audit]
fuzz = { runs = 50_000 }
invariant = { runs = 5_000, depth = 200 }